name: Weekly Expense Summary Cron

on:
  schedule:
    # Runs at 04:00 UTC (9:30 AM IST) every Sunday
    - cron: '0 4 * * 0'
  workflow_dispatch: # Allows manual trigger from GitHub UI

jobs:
  trigger-cron:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Weekly Expense Summary Endpoint
        run: |
          if [ -z "${{ secrets.APP_URL }}" ]; then
            echo "Error: APP_URL secret is not set."
            exit 1
          fi
          if [ -z "${{ secrets.CRON_SECRET }}" ]; then
            echo "Error: CRON_SECRET secret is not set."
            exit 1
          fi
          curl -fail -X POST "${{ secrets.APP_URL }}/api/cron/expenses?period=weekly" \
               -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}"
