name: Daily Recommendations Cron

on:
  schedule:
    # Runs at 02:00 UTC (7:30 AM IST) every day
    - cron: '0 2 * * *'
  workflow_dispatch: # Allows manual trigger from GitHub UI

jobs:
  trigger-cron:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Recommendations Endpoint
        run: |
          if [ -z "${{ secrets.APP_URL }}" ]; then
            echo "Error: APP_URL secret is not set."
            exit 1
          fi
          if [ -z "${{ secrets.CRON_SECRET }}" ]; then
            echo "Error: CRON_SECRET secret is not set."
            exit 1
          fi
          curl -fail -L -X POST "${{ secrets.APP_URL }}/api/cron/recommendations" \
               -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}"
