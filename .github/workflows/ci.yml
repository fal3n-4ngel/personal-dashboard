name: CI Build & Lint

on:
  push:
  pull_request:

jobs:
  build-and-lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run lint
        run: npm run lint
        env:
          # eslint-config-next/typescript does type-aware linting, which
          # builds a full TS program graph and can exceed Node's default
          # ~4GB old-space heap ceiling on this codebase — well within the
          # ubuntu-latest runner's 7GB RAM, so just raise the ceiling.
          NODE_OPTIONS: --max-old-space-size=6144

      - name: Run build
        run: npm run build
        env:
          # Dummy values for build validation
          NEXT_PUBLIC_ANILIST_CLIENT_ID: "46468"
          NEXT_PUBLIC_TRAKT_CLIENT_ID: "dummy_client_id"
          FIREBASE_CONFIG: '{"apiKey": "dummy", "authDomain": "dummy", "projectId": "dummy", "storageBucket": "dummy", "messagingSenderId": "dummy", "appId": "dummy"}'
