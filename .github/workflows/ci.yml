name: CI Build & Lint

on:
  push:
  pull_request:

jobs:
  build-and-lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run lint
        run: npm run lint

      - name: Run build
        run: npm run build
        env:
          # Dummy values for build validation
          NEXT_PUBLIC_ANILIST_CLIENT_ID: "46468"
          NEXT_PUBLIC_TRAKT_CLIENT_ID: "dummy_client_id"
          FIREBASE_CONFIG: '{"apiKey": "dummy", "authDomain": "dummy", "projectId": "dummy", "storageBucket": "dummy", "messagingSenderId": "dummy", "appId": "dummy"}'
